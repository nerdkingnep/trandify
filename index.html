<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendify - Fashion Trend Analyzer</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18",
        "react-dom": "https://esm.sh/react-dom@18",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        /* 스크롤바 숨기기 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom';
        import { 
            Search, Users, LayoutDashboard, Plus, Trash2, PlayCircle, TrendingUp, AlertCircle, 
            Loader2, Save, Activity, ChevronDown, Download, RefreshCw, BarChart3, Flame, 
            ArrowUpRight, ArrowDownRight, Info, Clock, Menu 
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, serverTimestamp } from 'firebase/firestore';

        // 사용자 제공 Firebase 설정값 적용
        const firebaseConfig = {
            apiKey: "AIzaSyAWZqzcUnYNlCTHBSQYKsJ9zXwa0SL32XU",
            authDomain: "trendify-app-c1c69.firebaseapp.com",
            projectId: "trendify-app-c1c69",
            storageBucket: "trendify-app-c1c69.firebasestorage.app",
            messagingSenderId: "579584571741",
            appId: "1:579584571741:web:05667fcd0809bbdca890b4"
        };
        
        const appId = "trendify-v1"; // 앱 식별 아이디
        const YOUTUBE_API_KEY = "AIzaSyDVOp4QWcVCwexNHh3r52hGpxEIl_UQkBg";

        // 파이어베이스 초기화
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('keywords');
            const [channels, setChannels] = useState([]);
            const [dashboardVideos, setDashboardVideos] = useState([]);
            const [loadingVideos, setLoadingVideos] = useState(false);
            const [newChannelInput, setNewChannelInput] = useState('');
            const [searchingChannel, setSearchingChannel] = useState(false);
            const [channelError, setChannelError] = useState('');
            const [trendingKeywords, setTrendingKeywords] = useState([]);
            const [loadingTrends, setLoadingTrends] = useState(false);
            const [genderFilter, setGenderFilter] = useState('전체');
            const [currentTime, setCurrentTime] = useState(new Date());

            const today = new Date();
            const pastMonth = new Date();
            pastMonth.setDate(today.getDate() - 30);
            
            const formatDateForInput = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
            const [dashStartDate, setDashStartDate] = useState(formatDateForInput(pastMonth));
            const [dashEndDate, setDashEndDate] = useState(formatDateForInput(today));

            // 인증 로직
            useEffect(() => {
                signInAnonymously(auth).catch(err => console.error("인증 에러:", err));
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => setUser(currentUser));
                return () => unsubscribe();
            }, []);

            // 데이터 실시간 리스너
            useEffect(() => {
                if (!user) return;
                const channelsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'channels');
                const unsub = onSnapshot(channelsRef, (snapshot) => {
                    const list = [];
                    snapshot.forEach((doc) => list.push({ id: doc.id, ...doc.data() }));
                    setChannels(list);
                });
                return () => unsub();
            }, [user]);

            // 채널 추가
            const handleAddChannel = async () => {
                if (!newChannelInput.trim() || !user) return;
                setSearchingChannel(true);
                setChannelError('');
                try {
                    const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(newChannelInput)}&type=channel&maxResults=1&key=${YOUTUBE_API_KEY}`);
                    const data = await res.json();
                    if (!data.items?.length) throw new Error('채널을 찾을 수 없습니다.');
                    const item = data.items[0];
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'channels', item.snippet.channelId), {
                        title: item.snippet.channelTitle,
                        thumbnail: item.snippet.thumbnails.default.url,
                        addedAt: serverTimestamp()
                    });
                    setNewChannelInput('');
                } catch (err) { setChannelError(err.message); } finally { setSearchingChannel(false); }
            };

            const removeChannel = async (id) => {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'channels', id));
            };

            const tabsConfig = [
                { id: 'keywords', icon: <Search size={20}/>, label: '트렌드' },
                { id: 'channels', icon: <Users size={20}/>, label: '채널' },
                { id: 'dashboard', icon: <LayoutDashboard size={20}/>, label: '분석' },
                { id: 'growth', icon: <Activity size={20}/>, label: '성장' }
            ];

            if (!user) return (
                <div className="flex flex-col items-center justify-center h-screen bg-white">
                    <Loader2 className="animate-spin text-blue-600 mb-4" size={48} />
                    <p className="font-bold text-gray-400">데이터베이스 연결 중...</p>
                </div>
            );

            return (
                <div className="flex h-screen bg-gray-50 flex-col md:flex-row overflow-hidden">
                    {/* 데스크탑 사이드바 */}
                    <aside className="hidden md:flex w-64 bg-white border-r border-gray-200 flex-col">
                        <div className="p-8 border-b border-gray-50">
                            <h1 className="text-2xl font-black text-blue-600 flex items-center gap-2">
                                <TrendingUp size={28}/> Trendify
                            </h1>
                        </div>
                        <nav className="flex-1 p-4 space-y-2">
                            {tabsConfig.map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all ${activeTab === item.id ? 'bg-gray-900 text-white font-bold shadow-lg shadow-gray-200' : 'hover:bg-gray-100 text-gray-500'}`}>
                                    {item.icon}{item.label}
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* 메인 영역 */}
                    <main className="flex-1 flex flex-col overflow-hidden">
                        <header className="bg-white border-b border-gray-100 px-6 md:px-10 py-6 flex justify-between items-center">
                            <h2 className="text-xl md:text-2xl font-black text-gray-800">
                                {tabsConfig.find(t => t.id === activeTab).label} 관리
                            </h2>
                            <div className="flex items-center gap-3 text-xs font-bold text-green-500 bg-green-50 px-3 py-1.5 rounded-full">
                                <div className="w-2 h-2 rounded-full bg-green-500"></div> 실시간 동기화 중
                            </div>
                        </header>

                        <section className="flex-1 overflow-auto p-6 md:p-10 pb-24 md:pb-10">
                            {activeTab === 'channels' && (
                                <div className="max-w-2xl mx-auto space-y-8">
                                    <div className="bg-white p-8 rounded-[32px] shadow-sm border border-gray-100">
                                        <h3 className="font-black text-xl mb-6">분석할 채널 추가</h3>
                                        <div className="flex gap-3">
                                            <input 
                                                type="text" 
                                                value={newChannelInput} 
                                                onChange={e => setNewChannelInput(e.target.value)}
                                                onKeyDown={e => e.key === 'Enter' && handleAddChannel()}
                                                placeholder="유튜브 채널명 또는 핸들" 
                                                className="flex-1 p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 outline-none font-medium"
                                            />
                                            <button onClick={handleAddChannel} disabled={searchingChannel} className="bg-blue-600 hover:bg-blue-700 text-white px-8 rounded-2xl font-black transition-all active:scale-95 disabled:opacity-50">
                                                {searchingChannel ? <Loader2 className="animate-spin" /> : '추가'}
                                            </button>
                                        </div>
                                        {channelError && <p className="text-red-500 text-sm mt-3 font-bold">{channelError}</p>}
                                    </div>

                                    <div className="bg-white rounded-[32px] shadow-sm border border-gray-100 overflow-hidden">
                                        <div className="p-6 bg-gray-50/50 border-b border-gray-50 font-bold text-gray-500 text-sm uppercase">등록된 채널 목록 ({channels.length})</div>
                                        <ul className="divide-y divide-gray-50">
                                            {channels.map(c => (
                                                <li key={c.id} className="p-5 flex items-center justify-between hover:bg-gray-50 transition-colors">
                                                    <div className="flex items-center gap-4">
                                                        <img src={c.thumbnail} className="w-12 h-12 rounded-full border border-gray-100 shadow-sm" />
                                                        <span className="font-bold text-gray-800">{c.title}</span>
                                                    </div>
                                                    <button onClick={() => removeChannel(c.id)} className="p-3 text-gray-300 hover:text-red-500 transition-colors"><Trash2 size={20}/></button>
                                                </li>
                                            ))}
                                            {channels.length === 0 && <li className="p-20 text-center text-gray-300 font-bold">등록된 채널이 없습니다.</li>}
                                        </ul>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'keywords' && (
                                <div className="flex flex-col items-center justify-center py-20 text-center">
                                    <Search size={48} className="text-gray-200 mb-4" />
                                    <h3 className="text-xl font-black text-gray-400">준비 중인 기능입니다.</h3>
                                    <p className="text-gray-400 mt-2">채널 관리 탭에서 채널을 먼저 추가해 주세요.</p>
                                </div>
                            )}
                        </section>
                    </main>

                    {/* 모바일 하단 네비게이션 */}
                    <nav className="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 flex justify-around items-center z-50 pb-safe">
                        {tabsConfig.map(item => (
                            <button key={item.id} onClick={() => setActiveTab(item.id)} className={`flex flex-col items-center justify-center w-full py-3 text-[10px] font-bold ${activeTab === item.id ? 'text-blue-600' : 'text-gray-400'}`}>
                                {item.icon}
                                <span className="mt-1">{item.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
